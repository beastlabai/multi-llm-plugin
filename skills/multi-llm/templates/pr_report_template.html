        var maxImp = 'low';
        if (hasSuggestions) {
          groups.forEach(function(g) {
            (g.suggestions || []).forEach(function(s) {
              var imp = (s.importance || 'low').toLowerCase();
              if (imp === 'high') maxImp = 'high';
              else if (imp === 'medium' && maxImp !== 'high') maxImp = 'medium';
            });
          });
        }

        // Task block
        html += '<div class="block' + (hasSuggestions ? '' : ' no-suggestions') + '" id="task-' + escapeHtml(taskId) + '">';

        // Block header
        html += '<div class="block-header" onclick="toggleBlockCollapse(this.parentElement)">';
        html += '<span class="collapse-icon">&#9660;</span>';
        html += '<span class="block-title">' + escapeHtml(title) + '</span>';
        html += '<div class="block-meta">';

        // Complexity badge in header
        var complexity = meta && (meta.estimated_complexity || meta.estimatedComplexity);
        if (complexity) {
          var compLower = complexity.toLowerCase();
          var compClass = compLower === 'high' ? 'complexity-high' : compLower === 'medium' ? 'complexity-medium' : 'complexity-low';
          html += '<span class="complexity-badge ' + compClass + '">' + escapeHtml(complexity.toUpperCase()) + '</span>';
        }

        // Only show badges when there are suggestions
        if (hasSuggestions) {
          html += renderBlockSummaryBadges(groups);
          if (maxImp === 'high') html += '<span class="badge badge-importance-high">HIGH</span>';
          else if (maxImp === 'medium') html += '<span class="badge badge-importance-medium">MEDIUM</span>';
        }

        html += '</div>'; // block-meta
        html += '</div>'; // block-header

        // Block body
        html += '<div class="block-body">';

        // Task detail card
        html += renderTaskDetailsCard(meta);

        // Suggestion groups - only render when there are suggestions
        if (hasSuggestions) {
          groups.forEach(function(group) {
            html += renderGroupPlaceholder(group, taskId);
          });
        }

        html += '</div>'; // block-body
        html += '</div>'; // block
      });

      // Coverage gaps section
      var coverageGaps = taskView._coverageGaps;
      if (coverageGaps && (coverageGaps.suggestions || []).length > 0) {
        var gapGroups = coverageGaps.suggestions || [];
        html += '<div class="coverage-section" id="coverage-gaps">';
        html += '<div class="coverage-header" onclick="toggleBlockCollapse(this.parentElement)">';
        html += '<span class="collapse-icon">&#9660;</span>';
        html += '<span class="block-title" style="color: var(--importance-high);">Coverage Gaps</span>';
        html += '<div class="block-meta">';
        html += renderBlockSummaryBadges(gapGroups);
        html += '<span class="badge badge-importance-high">HIGH</span>';
        html += '</div>';
        html += '</div>'; // coverage-header
        html += '<div class="coverage-body">';

        gapGroups.forEach(function(group) {
          html += renderGroupPlaceholder(group, 'Coverage Gaps');
        });

        html += '</div>'; // coverage-body
        html += '</div>'; // coverage-section
      }

      // Unanchored findings section
      var unanchoredEntry = taskView._unanchored;
      if (unanchoredEntry && (unanchoredEntry.suggestions || []).length > 0) {
        var unanchoredGroups = unanchoredEntry.suggestions || [];
        var unanchoredMaxImp = (unanchoredEntry.maxImportance || 'medium').toLowerCase();
        var unanchoredImpClass = unanchoredMaxImp === 'high' ? 'importance-high' : unanchoredMaxImp === 'medium' ? 'importance-medium' : 'importance-low';
        html += '<div class="block" id="unanchored-findings">';
        html += '<div class="block-header" onclick="toggleBlockCollapse(this.parentElement)">';
        html += '<span class="collapse-icon">&#9660;</span>';
        html += '<span class="block-title" style="color: var(--' + unanchoredImpClass + ');">Unanchored Findings</span>';
        html += '<div class="block-meta">';
        html += renderBlockSummaryBadges(unanchoredGroups);
        if (unanchoredMaxImp === 'high') html += '<span class="badge badge-importance-high">HIGH</span>';
        else if (unanchoredMaxImp === 'medium') html += '<span class="badge badge-importance-medium">MEDIUM</span>';
        html += '</div>';
        html += '</div>'; // block-header
        html += '<div class="block-body">';

        unanchoredGroups.forEach(function(group) {
          html += renderGroupPlaceholder(group, 'Unanchored');
        });

        html += '</div>'; // block-body
        html += '</div>'; // block
      }

      container.innerHTML = html;
    }

    /**
     * Render a consolidated umbrella banner.
     * Shows the synthesized title/description from the consolidated group
     * as a collapsible navigational aid above the first underlying suggestion.
     *
     * @param meta - Object with consolidatedTitle, consolidatedDescription,
     *               consolidatedImportance, consolidatedId, isSingleton, etc.
     * @returns HTML string for the umbrella banner
     */
    function renderUmbrellaBanner(meta) {
      if (!meta) return '';
      // Don't show banner for singletons (1:1 mapping, no added value)
      if (meta.isSingleton) return '';

      var bannerId = 'umbrella-' + (meta.consolidatedId || 'unknown');
      var impLower = (meta.consolidatedImportance || 'medium').toLowerCase();
      var impBadge = '';
      if (impLower === 'high') impBadge = '<span class="badge badge-importance-high umbrella-banner-importance">HIGH</span>';
      else if (impLower === 'medium') impBadge = '<span class="badge badge-importance-medium umbrella-banner-importance">MEDIUM</span>';
      else impBadge = '<span class="badge badge-importance-low umbrella-banner-importance">LOW</span>';

      var label = 'CG' + (meta.displayIndex || '');

      var html = '<div class="umbrella-banner" id="' + escapeHtml(bannerId) + '">';
      html += '<div class="umbrella-banner-header" onclick="toggleUmbrellaCollapse(this)">';
      html += '<span class="collapse-icon">&#9660;</span>';
      html += '<span class="umbrella-banner-label">' + escapeHtml(label) + '</span>';
      html += '<span class="umbrella-banner-title">' + escapeHtml(meta.consolidatedTitle || '') + '</span>';
      html += impBadge;
      html += '</div>'; // header

      var bodyContent = meta.consolidatedDescription || '';
      if (bodyContent) {
        html += '<div class="umbrella-banner-body">' + renderMarkdown(bodyContent) + '</div>';
      }

      html += '</div>'; // umbrella-banner
      return html;
    }

    /**
     * Toggle collapse state of an umbrella banner.
     */
    function toggleUmbrellaCollapse(headerEl) {
      var banner = headerEl.closest('.umbrella-banner');
      if (banner) banner.classList.toggle('collapsed');
    }

    /**
     * Render an inline group card with full interaction:
     * skip checkboxes, editable descriptions, validation overrides.
     * Uses the same ID scheme as the flat view for state interchangeability.
     */
    // --- Human/Claude decision overlay (populated post-apply from state.json) ---
    function getHumanDecisionInfo(group) {
      var hd = group.humanDecision || group.human_decision;
      if (!hd) return null;
      var outcome = hd.outcome || hd.decision || 'decided';
      var claudeDecided = hd.claudeDecided === true ||
        (typeof hd.source === 'string' && hd.source.indexOf('claude_auto_decide') === 0);
      return {
        outcome: outcome,
        claudeDecided: claudeDecided,
        reason: hd.reason || '',
        salvagedDescription: hd.salvagedDescription || hd.salvaged_description || '',
        dropped: hd.dropped || '',
        source: hd.source || ''
      };
    }

    function renderHumanDecisionBadge(group) {
      var info = getHumanDecisionInfo(group);
      if (!info) return '';
      var label = (info.claudeDecided ? 'Claude' : 'User') + ': ' + info.outcome;
      return '<span class="badge badge-claude-decision badge-decision-' + escapeHtml(info.outcome) + '"' +
        ' title="' + escapeHtml(info.reason) + '">⚙ ' + escapeHtml(label) + '</span>';
    }

    function renderHumanDecisionDetail(group) {
      var info = getHumanDecisionInfo(group);
      if (!info) return '';
      var summary = '⚙ ' + (info.claudeDecided ? 'Claude' : 'User') + ' decision: ' + info.outcome;
      var body = '';
      if (info.reason) body += '<div class="hd-line"><strong>Reason:</strong> ' + escapeHtml(info.reason) + '</div>';
      if (info.outcome === 'salvaged') {
        if (info.salvagedDescription) body += '<div class="hd-line"><strong>Kept:</strong> ' + escapeHtml(info.salvagedDescription) + '</div>';
        if (info.dropped) body += '<div class="hd-line"><strong>Dropped:</strong> ' + escapeHtml(info.dropped) + '</div>';
      }
      if (!body) body = '<div class="hd-line">No additional detail.</div>';
      return '<details class="human-decision-section badge-decision-' + escapeHtml(info.outcome) + '">' +
        '<summary>' + escapeHtml(summary) + '</summary>' +
        '<div class="human-decision-content">' + body + '</div>' +
        '</details>';
    }

    function renderGroupPlaceholder(group, blockContext) {
      if (!group) return '';

      // If this group is the first in a consolidated umbrella, render the banner
      var umbrellaHtml = '';
      if (group._umbrellaFirst && group._consolidatedMeta) {
        umbrellaHtml = renderUmbrellaBanner(group._consolidatedMeta);
      }

      var suggestions = group.suggestions || [];
      var models = group.models || [];
      var groupNum = group._groupIndex || 0;
      var groupHashKey = group.groupHash || String(groupNum);
      var groupDisplayLabel = group.displayLabel || ('G' + (groupNum + 1));
      var theme = group.theme || (suggestions.length > 0 ? suggestions[0].title : 'Suggestion group');
      var vs = group.validationStatus || group.validation_status || '';
      var validationReason = group.validationReason || group.validation_reason || '';
      var validationConfidence = group.validationConfidence || group.validation_confidence || 0;
      var isConsensus = models.length >= 3;
      var isGroupSkipped = !!selections.skipped_groups[groupHashKey];
      var maxImp = 'low';
      suggestions.forEach(function(s) {
        var imp = (s.importance || 'low').toLowerCase();
        if (imp === 'high') maxImp = 'high';
        else if (imp === 'medium' && maxImp !== 'high') maxImp = 'medium';
      });

      // Build labels map
      if (group.groupHash && group.displayLabel) {
        selections._labels[group.groupHash] = group.displayLabel;
      }
      suggestions.forEach(function(s) {
        if (s.id && s.displayLabel) {
          selections._labels[s.id] = s.displayLabel;
        }
      });

      // Validation override
      var effectiveValidation = selections.validation_overrides[groupHashKey] || vs;

      var consensusClass = isConsensus ? ' consensus' : '';
      var skippedClass = isGroupSkipped ? ' skipped' : '';
      // Prepend umbrella banner if this is the first group in a consolidated cluster
      var html = umbrellaHtml;
      html += '<div class="inline-group' + consensusClass + skippedClass + '" data-group-id="' + escapeHtml(groupHashKey) + '"' +
        ' data-validation="' + escapeHtml(vs) + '" data-importance="' + escapeHtml(maxImp) + '">';

      // Group bar
      html += '<div class="group-bar" onclick="togglePrGroupCollapse(this)">';
      html += '<span class="collapse-icon" style="font-size:0.6rem;">&#9660;</span>';
      html += '<span class="group-label">' + escapeHtml(groupDisplayLabel) + '</span>';
      html += '<span class="group-theme">' + escapeHtml(theme) + '</span>';
      html += '<span class="group-bar-right">';

      // Importance badge
      if (maxImp === 'high') html += '<span class="badge badge-importance-high">HIGH</span>';
      else if (maxImp === 'medium') html += '<span class="badge badge-importance-medium">MEDIUM</span>';
      else html += '<span class="badge badge-importance-low">LOW</span>';

      // Category badge
      if (group.category) {
        html += '<span class="badge badge-category">' + escapeHtml(group.category) + '</span>';
      }

      // Validation badge
      if (effectiveValidation === 'valid') html += '<span class="badge badge-validation-valid">valid</span>';
      else if (effectiveValidation === 'invalid') html += '<span class="badge badge-validation-invalid">invalid</span>';
      else if (effectiveValidation === 'needs-human-decision') html += '<span class="badge badge-validation-needs-human">needs human</span>';
      else if (effectiveValidation === 'validation_failed') html += '<span class="badge badge-validation-failed">failed</span>';

      // Human/Claude decision badge (post-apply)
      html += renderHumanDecisionBadge(group);

      // Consensus badge
      if (isConsensus) {
        html += '<span class="badge badge-consensus">Consensus (' + models.length + ' models)</span>';
      }

      // Skip control for group
      html += '<label class="skip-control" onclick="event.stopPropagation()">' +
        '<input type="checkbox"' + (isGroupSkipped ? ' checked' : '') +
        ' onchange="togglePrGroupSkip(\'' + escapeHtml(groupHashKey) + '\', this.checked)">' +
        'Skip</label>';

      html += '</span>'; // group-bar-right
      html += '</div>'; // group-bar

      // Group body (collapsible)
      html += '<div class="inline-group-body">';

      // Human/Claude decision detail (post-apply)
      html += renderHumanDecisionDetail(group);

      // Individual suggestions
      suggestions.forEach(function(s, idx) {
        var suggestionId = s.id || (groupDisplayLabel + 'S' + (idx + 1));
        var suggestionDisplayLabel = s.displayLabel || (groupDisplayLabel + 'S' + (idx + 1));
        var isSuggestionSkipped = !!selections.skipped_suggestions[suggestionId];
        var editedDescription = selections.edited_descriptions[suggestionId];
        var originalDescription = s.description || s.content || '';
        var displayDescription = editedDescription !== undefined ? editedDescription : originalDescription;
        var isModified = editedDescription !== undefined && editedDescription !== originalDescription;
        var sType = (s.type || '').toLowerCase();
        var typedClass = '';
        if (sType === 'addition' || sType === 'modification' || sType === 'deletion' || sType === 'clarification') {
          typedClass = ' typed-suggestion type-' + sType;
        }

        html += '<div class="inline-suggestion' + typedClass + (isSuggestionSkipped ? ' skipped' : '') + '" data-suggestion-id="' + escapeHtml(suggestionId) + '"' +
          ' data-importance="' + escapeHtml((s.importance || 'low').toLowerCase()) + '">';
        html += '<div class="suggestion-meta">';

        // Suggestion label
        html += '<span class="suggestion-label">' + escapeHtml(suggestionDisplayLabel) + '</span>';

        // Model badge
        html += getModelBadgeHtml(s.model || 'unknown');

        // Title
        html += '<span class="suggestion-title">' + escapeHtml(s.title || '') + '</span>';

        // Importance
        var sImp = (s.importance || 'low').toLowerCase();
        if (sImp === 'high') html += '<span class="badge badge-importance-high">HIGH</span>';
        else if (sImp === 'medium') html += '<span class="badge badge-importance-medium">MEDIUM</span>';
        else html += '<span class="badge badge-importance-low">LOW</span>';

        if (s.type) html += '<span class="badge badge-category">' + escapeHtml(s.type) + '</span>';

        // Skip control for suggestion
        html += '<label class="skip-control suggestion-skip" onclick="event.stopPropagation()">' +
          '<input type="checkbox"' + (isSuggestionSkipped ? ' checked' : '') +
          ' onchange="togglePrSuggestionSkip(\'' + escapeHtml(suggestionId) + '\', this.checked)">' +
          'Skip</label>';

        html += '</div>'; // suggestion-meta

        // Editable description (click-to-edit pattern from report_template.html)
        if (displayDescription) {
          html += '<div class="description-rendered' + (isModified ? ' modified' : '') + '"' +
            ' data-suggestion-id="' + escapeHtml(suggestionId) + '"' +
            ' onclick="switchToEditPr(\'' + escapeHtml(suggestionId) + '\')">' +
            renderMarkdown(displayDescription) +
            '<span class="edit-hint">Click to edit</span></div>';
          html += '<textarea class="description-editor hidden' + (isModified ? ' modified' : '') + '"' +
            ' data-suggestion-id="' + escapeHtml(suggestionId) + '"' +
            ' data-original="' + escapeAttr(originalDescription) + '"' +
            ' onblur="switchToViewPr(\'' + escapeHtml(suggestionId) + '\')"' +
            ' oninput="handleDescriptionEditPr(\'' + escapeHtml(suggestionId) + '\', this)">' +
            escapeHtml(displayDescription) + '</textarea>';
        }

        // Suggested fix block (if present)
        if (s.suggestedFix) {
          html += renderSuggestedFix(s.suggestedFix);
        }

        html += '</div>'; // inline-suggestion
      });

      html += '</div>'; // inline-group-body

      // Expandable validation reasoning section
      if (vs && validationReason) {
        var confidencePercent = Math.round(validationConfidence * 100);
        var confidenceClass = confidencePercent >= 70 ? 'high' : (confidencePercent >= 40 ? 'medium' : 'low');
        var valBadgeClass = 'badge-validation-' + (vs === 'needs-human-decision' ? 'needs-human' : vs.replace('_', '-'));
        html += '<details class="inline-validation-section">';
        html += '<summary>';
        html += '<span class="badge ' + valBadgeClass + '">' + escapeHtml(vs) + '</span>';
        html += ' Validation';
        if (confidencePercent > 0) {
          html += ' <span class="confidence-bar"><span class="confidence-fill ' + confidenceClass + '" style="width: ' + confidencePercent + '%"></span></span>';
          html += ' (' + confidencePercent + '%)';
        }
        html += '</summary>';
        html += '<div class="inline-validation-content">' + escapeHtml(validationReason) + '</div>';
        html += '</details>';
      }

      // Group actions bar
      html += '<div class="group-actions">';

      // Validation override dropdown
      if (vs) {
        html += '<select class="validation-override" onchange="setPrValidationOverride(\'' + escapeHtml(groupHashKey) + '\', this.value)">';
        html += '<option value=""' + (!selections.validation_overrides[groupHashKey] ? ' selected' : '') + '>Validation: ' + escapeHtml(vs) + '</option>';
        html += '<option value="valid"' + (selections.validation_overrides[groupHashKey] === 'valid' ? ' selected' : '') + '>Override: valid</option>';
        html += '<option value="invalid"' + (selections.validation_overrides[groupHashKey] === 'invalid' ? ' selected' : '') + '>Override: invalid</option>';
        html += '<option value="needs-human-decision"' + (selections.validation_overrides[groupHashKey] === 'needs-human-decision' ? ' selected' : '') + '>Override: needs-human</option>';
        if (vs === 'needs-human-decision') {
          html += '<option value="claude_decide"' + (selections.validation_overrides[groupHashKey] === 'claude_decide' ? ' selected' : '') + '>Let Claude decide</option>';
        }
        html += '</select>';
      }

      // "Skip all in this file/section" button (context-aware)
      if (blockContext) {
        html += '<button class="btn" onclick="batchSkipInBlock(\'' + escapeHtml(blockContext) + '\')" style="font-size:0.6875rem;padding:0.1875rem 0.5rem;">' +
          'Skip all in ' + escapeHtml(blockContext.length > 30 ? '...' + blockContext.substring(blockContext.length - 27) : blockContext) + '</button>';
      }

      html += '</div>'; // group-actions

      html += '</div>'; // inline-group
      return html;
    }

    /**
     * Render a suggested fix block.
     * Supports before_after and unified_diff formats.
     */
    function renderSuggestedFix(fix) {
      if (!fix) return '';

      var html = '<div class="suggested-fix">';
      html += '<div class="suggested-fix-label">Suggested fix (model recommendation)</div>';

      if (fix.before_after || fix.beforeAfter) {
        var ba = fix.before_after || fix.beforeAfter;
        var before = ba.before || '';
        var after = ba.after || '';

        html += '<div class="code-context">';
        // Before
        if (before) {
          var beforeLines = before.split('\n');
          for (var i = 0; i < beforeLines.length; i++) {
            html += '<div class="code-line line-del">' +
              '<span class="line-num"></span>' +
              '<span class="line-content">' + escapeHtml('-' + beforeLines[i]) + '</span>' +
              '</div>';
          }
        }
        // After
        if (after) {
          var afterLines = after.split('\n');
          for (var j = 0; j < afterLines.length; j++) {
            html += '<div class="code-line line-add">' +
              '<span class="line-num"></span>' +
              '<span class="line-content">' + escapeHtml('+' + afterLines[j]) + '</span>' +
              '</div>';
          }
        }
        html += '</div>';
      } else if (fix.unified_diff || fix.unifiedDiff) {
        var diff = fix.unified_diff || fix.unifiedDiff;
        var diffLines = diff.split('\n');

        html += '<div class="code-context">';
        for (var k = 0; k < diffLines.length; k++) {
          var dLine = diffLines[k];
          var dClass = 'code-line';
          if (dLine.charAt(0) === '+') dClass += ' line-add';
          else if (dLine.charAt(0) === '-') dClass += ' line-del';
          else dClass += ' line-ctx';

          html += '<div class="' + dClass + '">' +
            '<span class="line-num"></span>' +
            '<span class="line-content">' + escapeHtml(dLine) + '</span>' +
            '</div>';
        }
        html += '</div>';
      }

      html += '</div>'; // suggested-fix
      return html;
    }

    /**
     * Render the flat view content panel (card list).
     * Consumes the flat groups array directly, producing a card-list layout
     * that mirrors the patterns from report_template.html.
     */
    function renderFlatView() {
      var container = document.getElementById('flat-content');
      if (!container || !reportData) return;

      var groups = reportData.groups || [];
      if (groups.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#9989;</div>' +
          '<div class="empty-state-text">No suggestions to display.</div></div>';
        return;
      }

      var html = '';

      groups.forEach(function(group, groupIndex) {
        var groupNum = groupIndex + 1;
        var groupHashKey = group.groupHash || String(groupNum);
        var groupDisplayLabel = group.displayLabel || ('G' + groupNum);
        var isGroupSkipped = !!selections.skipped_groups[groupHashKey];
        var validationStatus = group.validationStatus || group.validation_status || '';
        var validationReason = group.validationReason || group.validation_reason || '';
        var validationConfidence = group.validationConfidence || group.validation_confidence || 0;
        var confidencePercent = Math.round(validationConfidence * 100);
        var suggestions = group.suggestions || [];
        var models = group.models || [];
        var theme = group.theme || (suggestions.length > 0 ? suggestions[0].title : 'Untitled Group');
        var isConsensus = models.length >= 3;

        // Compute max importance
        var maxImportance = '';
        var groupModels = [];
        suggestions.forEach(function(s) {
          if (s.model && groupModels.indexOf(s.model) === -1) groupModels.push(s.model);
          var imp = (s.importance || '').toUpperCase();
          if (imp === 'HIGH') maxImportance = 'HIGH';
          else if (imp === 'MEDIUM' && maxImportance !== 'HIGH') maxImportance = 'MEDIUM';
          else if (imp === 'LOW' && !maxImportance) maxImportance = 'LOW';
        });

        var modelBadgesHtml = groupModels.map(function(model) {
          return getModelBadgeHtml(model);
        }).join('');

        // Build labels map
        if (group.groupHash && group.displayLabel) {
          selections._labels[group.groupHash] = group.displayLabel;
        }
        suggestions.forEach(function(s) {
          if (s.id && s.displayLabel) {
            selections._labels[s.id] = s.displayLabel;
          }
        });

        // Umbrella banner for consolidated groups (flat view)
        if (group._umbrellaFirst && group._consolidatedMeta) {
          html += renderUmbrellaBanner(group._consolidatedMeta);
        }

        // Card
        html += '<div class="flat-group-card' + (isGroupSkipped ? ' skipped' : '') + '"' +
          ' data-group-id="' + escapeHtml(groupHashKey) + '">';

        // Header
        html += '<div class="flat-group-header" onclick="toggleFlatGroup(this)">';
        html += '<div class="flat-group-header-top">';
        html += '<span class="flat-group-toggle">&#9660;</span>';
        html += '<span class="flat-group-id">' + escapeHtml(groupDisplayLabel) + ':</span>';
        html += '<span class="flat-group-title">' + escapeHtml(theme) + '</span>';

        // Skip control for group
        html += '<label class="skip-control" onclick="event.stopPropagation()">' +
          '<input type="checkbox"' + (isGroupSkipped ? ' checked' : '') +
          ' onchange="toggleFlatGroupSkip(\'' + escapeHtml(groupHashKey) + '\', this.checked)">' +
          'Skip</label>';

        html += '</div>'; // header-top

        // Badges row
        html += '<div class="flat-group-badges">';
        if (maxImportance === 'HIGH') html += '<span class="badge badge-importance-high">HIGH</span>';
        else if (maxImportance === 'MEDIUM') html += '<span class="badge badge-importance-medium">MEDIUM</span>';
        else if (maxImportance === 'LOW') html += '<span class="badge badge-importance-low">LOW</span>';

        if (validationStatus === 'valid') html += '<span class="badge badge-validation-valid">valid</span>';
        else if (validationStatus === 'invalid') html += '<span class="badge badge-validation-invalid">invalid</span>';
        else if (validationStatus === 'needs-human-decision') html += '<span class="badge badge-validation-needs-human">needs human</span>';
        else if (validationStatus === 'validation_failed') html += '<span class="badge badge-validation-failed">failed</span>';

        html += renderHumanDecisionBadge(group);

        if (isConsensus) html += '<span class="badge badge-consensus">Consensus (' + models.length + ')</span>';

        html += modelBadgesHtml;
        html += '</div>'; // badges
        html += '</div>'; // header

        // Validation section (expandable)
        if (validationStatus) {
          var confidenceClass = confidencePercent >= 70 ? 'high' : (confidencePercent >= 40 ? 'medium' : 'low');
          html += '<details class="flat-validation-section">' +
            '<summary>' +
            '<span class="badge badge-validation-' + (validationStatus === 'needs-human-decision' ? 'needs-human' : validationStatus.replace('_', '-')) + '">' + escapeHtml(validationStatus) + '</span>' +
            ' Validation' +
            ' <span class="confidence-bar"><span class="confidence-fill ' + confidenceClass + '" style="width: ' + confidencePercent + '%"></span></span>' +
            ' (' + confidencePercent + '%)' +
            '</summary>' +
            '<div class="flat-validation-content">' + escapeHtml(validationReason || 'No reason provided.') + '</div>' +
            '</details>';
        }

        // Human/Claude decision detail (post-apply)
        html += renderHumanDecisionDetail(group);

        // Group content (suggestions)
        html += '<div class="flat-group-content">';

        suggestions.forEach(function(s, sIdx) {
          var suggestionId = s.id || (groupDisplayLabel + 'S' + (sIdx + 1));
          var isSuggestionSkipped = !!selections.skipped_suggestions[suggestionId];
          var editedDescription = selections.edited_descriptions[suggestionId];
          var originalDescription = s.description || s.content || '';
          var displayDescription = editedDescription !== undefined ? editedDescription : originalDescription;
          var isModified = editedDescription !== undefined && editedDescription !== originalDescription;
          var suggestionDisplayLabel = s.displayLabel || (groupDisplayLabel + 'S' + (sIdx + 1));

          html += '<div class="flat-suggestion-item' + (isSuggestionSkipped ? ' skipped' : '') + '">';
          html += '<div class="flat-suggestion-header">';
          html += '<span class="flat-suggestion-id">' + escapeHtml(suggestionDisplayLabel) + ':</span>';
          html += '<span class="suggestion-title">' + escapeHtml(s.title || s.summary || 'Untitled') + '</span>';

          if (s.importance) {
            var impClass = s.importance.toUpperCase() === 'HIGH' ? 'badge-importance-high' :
              s.importance.toUpperCase() === 'MEDIUM' ? 'badge-importance-medium' : 'badge-importance-low';
            html += '<span class="badge ' + impClass + '">' + escapeHtml(s.importance.toUpperCase()) + '</span>';
          }
          if (s.type) html += '<span class="badge badge-category">' + escapeHtml(s.type) + '</span>';
          if (s.model) html += getModelBadgeHtml(s.model);

          // File/section reference
          var fileRef = s.fileRef || '';
          var sectionRef = s.sectionRef || s.section || s.section_id || '';
          if (fileRef) {
            html += '<span class="flat-file-ref">' + escapeHtml(fileRef) + '</span>';
          } else if (sectionRef) {
            html += '<span class="flat-section-ref">Section: ' + escapeHtml(sectionRef) + '</span>';
          }

          // Skip control for suggestion
          html += '<label class="skip-control" onclick="event.stopPropagation()">' +
            '<input type="checkbox"' + (isSuggestionSkipped ? ' checked' : '') +
            ' onchange="toggleFlatSuggestionSkip(\'' + escapeHtml(suggestionId) + '\', this.checked)">' +
            'Skip</label>';

          html += '</div>'; // suggestion-header

          // Description
          if (displayDescription) {
            html += '<div class="description-rendered' + (isModified ? ' modified' : '') + '">' +
              renderMarkdown(displayDescription) + '</div>';
          }

          // Suggested fix
          if (s.suggestedFix) {
            html += renderSuggestedFix(s.suggestedFix);
          }

          html += '</div>'; // suggestion-item
        });

        html += '</div>'; // group-content
        html += '</div>'; // group-card
      });

      container.innerHTML = html;
    }

    /**
     * Toggle collapse on a flat view group card.
     */
    function toggleFlatGroup(headerEl) {
      var card = headerEl.closest('.flat-group-card');
      if (card) card.classList.toggle('collapsed');
    }

    /**
     * Toggle skip state on a flat view group.
     * Syncs with PR view elements.
     */
    function toggleFlatGroupSkip(groupHashKey, isSkipped) {
      if (isSkipped) {
        selections.skipped_groups[groupHashKey] = true;
      } else {
        delete selections.skipped_groups[groupHashKey];
      }
      var card = document.querySelector('.flat-group-card[data-group-id="' + groupHashKey + '"]');
      if (card) card.classList.toggle('skipped', isSkipped);

      // Sync to PR view
      document.querySelectorAll('.inline-group[data-group-id="' + groupHashKey + '"]').forEach(function(el) {
        el.classList.toggle('skipped', isSkipped);
        var cb = el.querySelector('.group-bar .skip-control input[type="checkbox"]');
        if (cb) cb.checked = isSkipped;
      });

      saveSelections();
      updateBatchSkipCount();
    }

    /**
     * Toggle skip state on a flat view suggestion.
     * Syncs with PR view elements.
     */
    function toggleFlatSuggestionSkip(suggestionId, isSkipped) {
      if (isSkipped) {
        selections.skipped_suggestions[suggestionId] = true;
      } else {
        delete selections.skipped_suggestions[suggestionId];
      }

      // Update flat view element
      document.querySelectorAll('.flat-suggestion-item').forEach(function(el) {
        var cb = el.querySelector('.skip-control input[type="checkbox"]');
        if (cb) {
          var onChange = cb.getAttribute('onchange') || '';
          if (onChange.indexOf(suggestionId) >= 0) {
            el.classList.toggle('skipped', isSkipped);
          }
        }
      });

      // Sync to PR view
      document.querySelectorAll('.inline-suggestion[data-suggestion-id="' + suggestionId + '"]').forEach(function(el) {
        el.classList.toggle('skipped', isSkipped);
        var cb = el.querySelector('.skip-control input[type="checkbox"]');
        if (cb) cb.checked = isSkipped;
      });

      saveSelections();
      updateBatchSkipCount();
    }

    // ================================================================
    // IntersectionObserver for active sidebar highlighting
    // ================================================================
    var blockObserver = null;

    /**
     * Set up IntersectionObserver to track which content block is
     * currently visible and highlight the corresponding sidebar entry.
     */
    function setupScrollObserver() {
      // Clean up any existing observer
      if (blockObserver) {
        blockObserver.disconnect();
        blockObserver = null;
      }

      // Only observe in PR view
      if (currentView !== 'pr') return;

      var sidebarItems = document.querySelectorAll('#sidebar-content .sidebar-item');
      if (sidebarItems.length === 0) return;

      // Build a map from target ID to sidebar item(s)
      var targetMap = {};
      sidebarItems.forEach(function(item) {
        var target = item.getAttribute('data-target');
        if (target) {
          targetMap[target] = item;
        }
      });

      // Collect all observable block elements
      var blockElements = [];
      Object.keys(targetMap).forEach(function(targetId) {
        var el = document.getElementById(targetId);
        if (el) blockElements.push(el);
      });

      if (blockElements.length === 0) return;

      // Track which blocks are visible; the topmost visible one gets active state
      var visibleBlocks = {};

      blockObserver = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          var id = entry.target.id;
          if (entry.isIntersecting) {
            visibleBlocks[id] = entry.boundingClientRect.top;
          } else {
            delete visibleBlocks[id];
          }
        });

        // Find the topmost visible block
        var topmostId = null;
        var topmostTop = Infinity;
        Object.keys(visibleBlocks).forEach(function(id) {
          // Re-read position to get current value (observer callback may fire asynchronously)
          var el = document.getElementById(id);
          if (el) {
            var rect = el.getBoundingClientRect();
            if (rect.top < topmostTop) {
              topmostTop = rect.top;
              topmostId = id;
            }
          }
        });

        // Update sidebar active state
        if (topmostId) {
          sidebarItems.forEach(function(item) {
            var target = item.getAttribute('data-target');
            item.classList.toggle('active', target === topmostId);
          });
        }
      }, {
        // Use a margin that accounts for the sticky header height
        rootMargin: '-60px 0px -40% 0px',
        threshold: 0
      });

      blockElements.forEach(function(el) {
        blockObserver.observe(el);
      });
    }

    // ================================================================
    // Initialization
    // ================================================================
    function init() {
      if (window._initDone) return;
      window._initDone = true;

      if (!reportData) {
        document.getElementById('pr-content').innerHTML =
          '<div class="empty-state"><div class="empty-state-icon">&#9888;</div>' +
          '<div class="empty-state-text">No report data available.</div>' +
          '<div class="empty-state-hint">Report data will be injected by the generator.</div></div>';
        return;
      }

      // Initialize selections metadata
      selections.plan_path = reportData.planPath || '';
      selections.phase = reportData.phase || '';

      // Load persisted selections (skip states, edited descriptions, validation overrides)
      loadSelections();
      updateExportIndicator();

      // Annotate groups with index for stable ID generation
      (reportData.groups || []).forEach(function(group, idx) {
        group._groupIndex = idx;
      });

      // Render header, summary, sidebar, notices
      renderHeader();
      renderSummary();
      renderSidebar();
      renderNotices();

      // Set context-appropriate label on the "natural order" button
      var phase = reportData.phase || '';
      var naturalLabel = document.getElementById('sort-natural-label');
      if (naturalLabel) {
        var labels = { 'review-plan': 'Plan Order', 'code-review': 'File Order', 'review-tasks': 'Task Order' };
        naturalLabel.textContent = labels[phase] || 'Natural';
      }

      // Restore persisted sort preference
      try {
        var savedSort = localStorage.getItem('multi-llm-sort-mode');
        if (savedSort && (savedSort === 'natural' || savedSort === 'priority')) {
          sortMode = savedSort;
          document.querySelectorAll('.sort-toggle button').forEach(function(btn) {
            btn.classList.toggle('active', btn.getAttribute('data-sort') === sortMode);
          });
        }
      } catch (e) { /* ignore */ }

      // Render content based on phase
      if (phase === 'code-review') {
        renderCodeReview();
      } else if (phase === 'review-plan') {
        renderPlanReview();
      } else if (phase === 'review-tasks') {
        renderTaskReview();
      }

      // Render flat view (always available as toggle target)
      renderFlatView();

      // Default-collapse no-suggestion blocks, then restore user overrides
      applyDefaultCollapse();
      restoreCollapsedBlocks();

      // Restore view preference from localStorage
      try {
        var savedView = localStorage.getItem('multi-llm-pr-view-preference');
        if (savedView && (savedView === 'pr' || savedView === 'flat')) {
          switchView(savedView);
        }
      } catch (e) { /* ignore */ }

      // Restore sidebar collapsed state
      try {
        if (localStorage.getItem('multi-llm-sidebar-collapsed') === '1') {
          var sb = document.getElementById('sidebar');
          var ic = document.getElementById('sidebar-collapse-icon');
          if (sb) sb.classList.add('collapsed');
          if (ic) ic.innerHTML = '&#9654;';
        }
      } catch (e) { /* ignore */ }

      // Update batch skip count display
      updateBatchSkipCount();

      // Set first sidebar item as active
      var firstItem = document.querySelector('.sidebar-item');
      if (firstItem) firstItem.classList.add('active');

      // Set up scroll-based sidebar highlighting
      setupScrollObserver();
    }

    // Run on DOM ready, waiting for marked library to load
    function startInit() {
      if (window.markedParse) {
        init();
      } else {
        window.addEventListener('marked-ready', init, { once: true });
        // Fallback: if marked doesn't load within 3 seconds, init anyway
        setTimeout(function() {
          if (!window._initDone) init();
        }, 3000);
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', startInit);
    } else {
      startInit();
    }
  </script>
</body>
