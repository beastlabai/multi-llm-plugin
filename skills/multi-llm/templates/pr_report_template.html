      var diff = Date.now() - new Date(isoString).getTime();
      var seconds = Math.floor(diff / 1000);
      if (seconds < 60) return 'just now';
      var minutes = Math.floor(seconds / 60);
      if (minutes < 60) return minutes + 'm ago';
      var hours = Math.floor(minutes / 60);
      if (hours < 24) return hours + 'h ago';
      var days = Math.floor(hours / 24);
      return days + 'd ago';
    }

    function updateExportIndicator() {
      var el = document.getElementById('export-indicator');
      if (!el) return;
      if (selections.last_file_export_at) {
        el.textContent = '\u2713 Exported ' + timeAgo(selections.last_file_export_at);
        el.style.display = '';
      } else {
        el.style.display = 'none';
      }
    }

    // ================================================================
    // Export (same ID scheme as flat view)
    // ================================================================
    function exportSelections() {
      selections.exported_at = new Date().toISOString();
      selections.last_file_export_at = selections.exported_at;
      saveSelections();
      var blob = new Blob([JSON.stringify(selections, null, 2)], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'user_selections.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      updateExportIndicator();
    }

    // ================================================================
    // Block Collapse with localStorage persistence
    // ================================================================
    function getCollapseStorageKey() {
      return 'multi-llm-pr-collapsed-' + (selections.phase || '') + '-' + (selections.plan_path || '');
    }

    function loadCollapsedBlocks() {
      try {
        var stored = localStorage.getItem(getCollapseStorageKey());
        if (stored) return JSON.parse(stored);
      } catch (e) { /* ignore */ }
      return {};
    }

    function saveCollapsedBlocks(collapsed) {
      try {
        localStorage.setItem(getCollapseStorageKey(), JSON.stringify(collapsed));
      } catch (e) { /* ignore */ }
    }

    function toggleBlockCollapse(blockEl) {
      if (!blockEl) return;
      blockEl.classList.toggle('collapsed');
      var blockId = blockEl.id;
      if (blockId) {
        var collapsed = loadCollapsedBlocks();
        if (blockEl.classList.contains('collapsed')) {
          collapsed[blockId] = "collapsed";
        } else {
          collapsed[blockId] = "expanded";
        }
        saveCollapsedBlocks(collapsed);
      }
    }

    function restoreCollapsedBlocks() {
      var collapsed = loadCollapsedBlocks();
      Object.keys(collapsed).forEach(function(blockId) {
        var el = document.getElementById(blockId);
        if (!el) return;
        var state = collapsed[blockId];
        if (state === "expanded") {
          el.classList.remove('collapsed');
        } else {
          // Backward compat: old format was { blockId: true }
          el.classList.add('collapsed');
        }
      });

    /**
     * Skip all suggestions with LOW importance.
     * Expands to per-suggestion skip states.
     */
    function batchSkipAllLow() {
      var groups = reportData.groups || [];
      var count = 0;
      groups.forEach(function(group, groupIndex) {
        var groupDisplayLabel = group.displayLabel || ('G' + (groupIndex + 1));
        (group.suggestions || []).forEach(function(s, sIdx) {
          var imp = (s.importance || 'low').toUpperCase();
          if (imp === 'LOW') {
            var suggestionId = s.id || (groupDisplayLabel + 'S' + (sIdx + 1));
            if (!selections.skipped_suggestions[suggestionId]) {
              selections.skipped_suggestions[suggestionId] = true;
              count++;
            }
          }
        });
      });
      if (count > 0) {
        saveSelections();
        syncViewStates();
      }
    }

    /**
     * Skip all suggestions in groups with 'invalid' validation status.
     * Expands to per-suggestion skip states.
     */
    function batchSkipAllInvalid() {
      var groups = reportData.groups || [];
      var count = 0;
      groups.forEach(function(group, groupIndex) {
        var vs = group.validationStatus || group.validation_status || '';
        var overridden = selections.validation_overrides[group.groupHash || String(groupIndex)];
        var effectiveVs = overridden || vs;
        if (effectiveVs === 'invalid') {
          var groupDisplayLabel = group.displayLabel || ('G' + (groupIndex + 1));
          (group.suggestions || []).forEach(function(s, sIdx) {
            var suggestionId = s.id || (groupDisplayLabel + 'S' + (sIdx + 1));
            if (!selections.skipped_suggestions[suggestionId]) {
              selections.skipped_suggestions[suggestionId] = true;
              count++;
            }
          });
        }
      });
      if (count > 0) {
        saveSelections();
        syncViewStates();
      }
    }

    /**
     * Skip all suggestions in a given block (file, section, or task).
     * blockContext is the identifier (file path, section ref, task ID).
     * Expands to per-suggestion skip states.
     */
    function batchSkipInBlock(blockContext) {
      var groups = reportData.groups || [];
      var count = 0;
      groups.forEach(function(group, groupIndex) {
        var groupDisplayLabel = group.displayLabel || ('G' + (groupIndex + 1));
        (group.suggestions || []).forEach(function(s, sIdx) {
          var ref = s.fileRef || s.file || s.sectionRef || s.section || s.section_id || s.taskRef || s.task_id || '';
          if (ref === blockContext) {
            var suggestionId = s.id || (groupDisplayLabel + 'S' + (sIdx + 1));
            if (!selections.skipped_suggestions[suggestionId]) {
              selections.skipped_suggestions[suggestionId] = true;
              count++;
            }
          }
        });
      });

      // Also check fileView/sectionView/taskView for grouped references
      if (count === 0) {
        var phase = reportData.phase || '';
        var viewData = null;

        if (phase === 'code-review') viewData = reportData.fileView || {};
        else if (phase === 'review-plan') viewData = reportData.sectionView || {};
        else if (phase === 'review-tasks') viewData = reportData.taskView || {};

        if (viewData && viewData[blockContext]) {
          var entry = viewData[blockContext];
          var blockGroups = entry.suggestions || [];
          blockGroups.forEach(function(group, gi) {
            var groupDisplayLabel = group.displayLabel || ('G' + ((group._groupIndex || gi) + 1));
            (group.suggestions || []).forEach(function(s, sIdx) {
              var suggestionId = s.id || (groupDisplayLabel + 'S' + (sIdx + 1));
              if (!selections.skipped_suggestions[suggestionId]) {
                selections.skipped_suggestions[suggestionId] = true;
                count++;
              }
            });
          });
        }
      }

      if (count > 0) {
        saveSelections();
        syncViewStates();
      }
    }

     * Remove all skip states (groups and suggestions).
     */
    function batchUnskipAll() {
      selections.skipped_groups = {};
      selections.skipped_suggestions = {};
      saveSelections();
      syncViewStates();
    }

    /**

     */
    function updateBatchSkipCount() {
      var countEl = document.getElementById('batch-skip-count');
      if (!countEl) return;
      var groupCount = Object.keys(selections.skipped_groups).length;

      }
    }

    // ================================================================
    // Diff rendering and code context display (T007)
    // ================================================================

    // ================================================================
    // Inline comment positioning (T009)
    // ================================================================

    /**
     * Parse a hunk header to extract new-side start line and count.
     * Format: @@ -old_start,old_count +new_start,new_count @@ ...
     * Returns { oldStart, oldCount, newStart, newCount } or null.
     */
    function parseHunkHeader(header) {
      if (!header) return null;
      var match = header.match(/@@ -(\d+)(?:,(\d+))? \+(\d+)(?:,(\d+))? @@/);
      if (!match) return null;
      return {
        oldStart: parseInt(match[1], 10),
        oldCount: match[2] !== undefined ? parseInt(match[2], 10) : 1,
        newStart: parseInt(match[3], 10),
        newCount: match[4] !== undefined ? parseInt(match[4], 10) : 1
      };
    }

    /**
     * Compute the new-side line range covered by a hunk.
     * Walks the hunk's lines to find the actual min and max new-side line numbers.
     * Returns { newMin, newMax } or null if no new-side lines found.
     */
    function computeHunkNewRange(hunk) {
      var lines = hunk.lines || hunk;
      if (!Array.isArray(lines)) return null;

      var newMin = Infinity;
      var newMax = -Infinity;

      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (!line || line.type === 'remove' || line.type === 'hunk_header') continue;
        if (line.new_line != null) {
          if (line.new_line < newMin) newMin = line.new_line;
          if (line.new_line > newMax) newMax = line.new_line;
        }
      }

      // Also use the header if available
      if (hunk.header) {
        var parsed = parseHunkHeader(hunk.header);
        if (parsed) {
          var headerMin = parsed.newStart;
          var headerMax = parsed.newStart + Math.max(parsed.newCount - 1, 0);
          if (headerMin < newMin) newMin = headerMin;
          if (headerMax > newMax) newMax = headerMax;
        }
      }

      if (newMin === Infinity) return null;
      return { newMin: newMin, newMax: newMax };
    }

    /**
     * Map a suggestion's line number to a position within the diff hunks.
     *
     * Algorithm:
     * 1. Parse each hunk to determine the new-side line range it covers.
     * 2. Find the hunk whose new-side range contains the target line.
     * 3. Within that hunk, find the index of the diff line with matching new_line.
     *
     * Returns: { hunkIndex, lineIndex } or null if line is outside all hunks.
     *   hunkIndex: index into the hunks array
     *   lineIndex: index into the hunk's lines array (position after which to insert comment)
     */
    function mapLineToDiffPosition(filePath, lineNumber, diffHunks) {
      if (!diffHunks || !Array.isArray(diffHunks) || lineNumber == null) return null;

      for (var h = 0; h < diffHunks.length; h++) {
        var hunk = diffHunks[h];
        var range = computeHunkNewRange(hunk);
        if (!range) continue;

        // Check if lineNumber falls within this hunk's new-side range
        if (lineNumber >= range.newMin && lineNumber <= range.newMax) {
          var lines = hunk.lines || hunk;
          if (!Array.isArray(lines)) continue;

          // Find the last line in this hunk with new_line <= lineNumber
          var bestIdx = -1;
          for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            if (!line || line.type === 'hunk_header') continue;
            if (line.type === 'remove') continue; // removed lines don't have new-side numbers
            if (line.new_line != null && line.new_line <= lineNumber) {
              bestIdx = i;
            }
          }

          if (bestIdx >= 0) {
            return { hunkIndex: h, lineIndex: bestIdx };
          }
          // If we're in range but couldn't find exact line, anchor to end of hunk
          return { hunkIndex: h, lineIndex: (Array.isArray(lines) ? lines.length - 1 : 0) };
        }
      }

      return null; // Line is outside all hunks
    }

    /**
     * Classify suggestion groups into positioning buckets for a file's diff.
     * Returns an object with:
     *   inlineGroups: Array of { group, position: {hunkIndex, lineIndex}, sortKey }
     *                 sorted by position for insertion
     *   outsideGroups: Array of { group, lineRange } - groups referencing lines outside diff hunks
     *   fileLevelGroups: Array of group - groups with file_path but no line_range/anchor_text
     *
     * @param groups - Array of suggestion groups for this file
     * @param filePath - The file path
     * @param diffHunks - The parsed diff hunks for this file
     */
    function classifySuggestionGroups(groups, filePath, diffHunks) {
      var result = {
        inlineGroups: [],
        outsideGroups: [],
        fileLevelGroups: []
      };

      if (!groups || groups.length === 0) return result;

      var hasDiff = diffHunks && Array.isArray(diffHunks) && diffHunks.length > 0;

      groups.forEach(function(group) {
        var suggestions = group.suggestions || [];

        // Find the representative line number for this group:
        // Use the first suggestion's lineRange to determine position
        var representativeLine = null;
        var representativeRange = null;
        var hasAnchorText = false;
        var hasLineRange = false;

        for (var s = 0; s < suggestions.length; s++) {
          var sugg = suggestions[s];
          if (sugg.lineRange && Array.isArray(sugg.lineRange) && sugg.lineRange.length >= 1) {
            if (!hasLineRange) {
              representativeLine = sugg.lineRange[0]; // Start line
              representativeRange = sugg.lineRange;
              hasLineRange = true;
            }
          }
          if (sugg.anchorText) {
            hasAnchorText = true;
          }
        }

        if (!hasLineRange && !hasAnchorText) {
          // No line range and no anchor text -> file-level comment
          result.fileLevelGroups.push(group);
          return;
        }

        if (!hasDiff || !hasLineRange) {
          // No diff data or no line range -> can't position inline, treat as file-level
          if (hasLineRange) {
            result.outsideGroups.push({ group: group, lineRange: representativeRange });
          } else {
            result.fileLevelGroups.push(group);
          }
          return;
        }

        // Try to map to a diff position
        var position = mapLineToDiffPosition(filePath, representativeLine, diffHunks);

        if (position) {
          result.inlineGroups.push({
            group: group,
            position: position,
            representativeLine: representativeLine,
            sortKey: position.hunkIndex * 100000 + position.lineIndex
          });
        } else {
          // Line is outside all diff hunks
          result.outsideGroups.push({ group: group, lineRange: representativeRange });
        }
      });

      // Sort inline groups by position (hunk index, then line index)
      // For same-position groups, sort by consensus count desc, then max importance
      result.inlineGroups.sort(function(a, b) {
        if (a.sortKey !== b.sortKey) return a.sortKey - b.sortKey;
        // Same position: sort by consensus count desc, then importance
        var aModels = (a.group.models || []).length;
        var bModels = (b.group.models || []).length;
        if (aModels !== bModels) return bModels - aModels;
        var impOrder = { high: 0, medium: 1, low: 2 };
        var aImp = getGroupMaxImportance(a.group);
        var bImp = getGroupMaxImportance(b.group);
        return (impOrder[aImp] || 2) - (impOrder[bImp] || 2);
      });

      return result;
    }

    /**
     * Get the maximum importance level from a group's suggestions.
     */
    function getGroupMaxImportance(group) {
      var maxImp = 'low';
      (group.suggestions || []).forEach(function(s) {
        var imp = (s.importance || 'low').toLowerCase();
        if (imp === 'high') maxImp = 'high';
        else if (imp === 'medium' && maxImp !== 'high') maxImp = 'medium';
      });
      return maxImp;
    }

    /**
     * Render diff hunks for a file with inline suggestion groups interleaved.
     * This is the enhanced version of renderDiffHunks that positions comment
     * cards after the referenced diff lines.
     *
     * @param filePath - File path
     * @param inlineGroups - Array of { group, position } sorted by position
     * @param blockContext - Context string for batch actions
     * @returns HTML string
     */
    function renderDiffHunksWithInlineComments(filePath, inlineGroups, blockContext) {
      var diffData = reportData.diffData || {};
      var fileData = diffData[filePath];
      if (!fileData) return '';

      // Handle binary files
      if (fileData.binary) {
        return '<div class="context-unavailable"><span class="info-icon">&#128196;</span> Binary file &mdash; no diff available</div>';
      }

      var hunks = fileData.hunks || fileData;
      if (!Array.isArray(hunks) || hunks.length === 0) return '';

      // Build a lookup: (hunkIndex, lineIndex) -> [groups to insert after this line]
      var insertionMap = {};
      (inlineGroups || []).forEach(function(item) {
        var key = item.position.hunkIndex + ':' + item.position.lineIndex;
        if (!insertionMap[key]) insertionMap[key] = [];
        insertionMap[key].push(item.group);
      });

      var html = '<div class="context-label diff-label">Changes under review (git diff)</div>';
      html += '<div class="code-context">';

      for (var h = 0; h < hunks.length; h++) {
        var hunk = hunks[h];
        var lines = hunk.lines || hunk;

        // If hunk has a header string, render it
        if (hunk.header) {
          html += '<div class="diff-hunk-header">' + escapeHtml(hunk.header) + '</div>';
        }

        // Render lines as an array, inserting comment cards at positions
        var lineArr = Array.isArray(lines) ? lines : [];
        var realLineIdx = -1; // Track actual line index (excluding hunk_header pseudo-lines)
        for (var i = 0; i < lineArr.length; i++) {
          var line = lineArr[i];
          if (!line) continue;

          var lineType = line.type || 'context';

          // Hunk header lines (@@)
          if (lineType === 'hunk_header') {
            html += '<div class="diff-hunk-header">' + escapeHtml(line.content || '') + '</div>';
            continue;
          }

          realLineIdx++;

          var lineClass = 'code-line';
          if (lineType === 'add') lineClass += ' line-add';
          else if (lineType === 'remove') lineClass += ' line-del';
          else lineClass += ' line-ctx';

          var oldNum = line.old_line != null ? String(line.old_line) : '';
          var newNum = line.new_line != null ? String(line.new_line) : '';
          var prefix = lineType === 'add' ? '+' : lineType === 'remove' ? '-' : ' ';
          var content = line.content != null ? line.content : '';

          html += '<div class="' + lineClass + '" data-new-line="' + escapeHtml(newNum) + '">' +
            '<div class="line-num-pair">' +
              '<span class="line-num">' + escapeHtml(oldNum) + '</span>' +
              '<span class="line-num">' + escapeHtml(newNum) + '</span>' +
            '</div>' +
            '<span class="line-content">' + escapeHtml(prefix + content) + '</span>' +
            '</div>';

          // Check for inline comment insertion at this position
          var insertKey = h + ':' + i;
          if (insertionMap[insertKey]) {
            // Close the code-context div, insert comment cards, then reopen
            html += '</div>'; // close code-context
            insertionMap[insertKey].forEach(function(group) {
              html += renderGroupPlaceholder(group, blockContext);
            });
            html += '<div class="code-context">'; // reopen code-context
          }
        }
      }

      // Handle truncation notices
      if (fileData.truncated_at) {
        html += '<div class="diff-truncation-notice">[diff truncated &mdash; showing first ' + fileData.truncated_at + ' of ' + (fileData.total_lines || '?') + ' lines]</div>';
      }
      if (fileData.truncated) {
        html += '<div class="diff-truncation-notice">[diff omitted &mdash; size budget exceeded]</div>';
      }

      html += '</div>';
      return html;
    }

    /**
     * Render diff hunks for a file as HTML table rows.
     * Each hunk line is a {type, old_line, new_line, content} object.
     * Returns HTML string for the diff block.
     */
    function renderDiffHunks(filePath) {
      var diffData = reportData.diffData || {};
      var fileData = diffData[filePath];
      if (!fileData) return '';

      // Handle binary files
      if (fileData.binary) {
        return '<div class="context-unavailable"><span class="info-icon">&#128196;</span> Binary file &mdash; no diff available</div>';
      }

      var hunks = fileData.hunks || fileData;
      if (!Array.isArray(hunks) || hunks.length === 0) return '';

      var html = '<div class="context-label diff-label">Changes under review (git diff)</div>';
      html += '<div class="code-context">';

      for (var h = 0; h < hunks.length; h++) {

        var lineArr = Array.isArray(lines) ? lines : [];
        for (var i = 0; i < lineArr.length; i++) {

          if (!line) continue;

          // Hunk header lines (@@)
          if (lineType === 'hunk_header') {

          var lineClass = 'code-line';
          if (lineType === 'add') lineClass += ' line-add';
          else if (lineType === 'remove') lineClass += ' line-del';
          else lineClass += ' line-ctx';

          var oldNum = line.old_line != null ? String(line.old_line) : '';
          var newNum = line.new_line != null ? String(line.new_line) : '';
          var prefix = lineType === 'add' ? '+' : lineType === 'remove' ? '-' : ' ';
          var content = line.content != null ? line.content : '';

          html += '<div class="' + lineClass + '">' +
            '<div class="line-num-pair">' +
              '<span class="line-num">' + escapeHtml(oldNum) + '</span>' +
              '<span class="line-num">' + escapeHtml(newNum) + '</span>' +
            '</div>' +
            '<span class="line-content">' + escapeHtml(prefix + content) + '</span>' +
            '</div>';
        }
      }

      // Handle truncation notices
      if (fileData.truncated_at) {
        html += '<div class="diff-truncation-notice">[diff truncated &mdash; showing first ' + fileData.truncated_at + ' of ' + (fileData.total_lines || '?') + ' lines]</div>';
      }
      if (fileData.truncated) {
        html += '<div class="diff-truncation-notice">[diff omitted &mdash; size budget exceeded]</div>';
      }

      html += '</div>';
      return html;
    }

    /**
     * Render file content context (fallback when no diff available).
     * Uses reportData.fileContexts[filePath] which contains
     * an array of {line_number, content} objects.
     */
    function renderFileContext(filePath, lineRange) {
      var fileContexts = reportData.fileContexts || {};
      var contextEntry = fileContexts[filePath];
      // The generator stores file contexts as objects: {source, lines, available}
      // Extract the raw lines array from the entry
      var contextLines = contextEntry && contextEntry.lines ? contextEntry.lines
                       : (Array.isArray(contextEntry) ? contextEntry : null);
      if (!contextLines || !Array.isArray(contextLines) || contextLines.length === 0) return '';

      var startLine = contextLines[0].line_number || 1;
      var endLine = contextLines[contextLines.length - 1].line_number || startLine;

      var label = 'File context';
      if (lineRange && Array.isArray(lineRange) && lineRange.length >= 2) {
        label += ' (lines ' + lineRange[0] + '-' + lineRange[1] + ')';
      } else {
        label += ' (lines ' + startLine + '-' + endLine + ')';
      }

      var html = '<div class="context-label">' + escapeHtml(label) + '</div>';
      html += '<div class="code-context">';

      for (var i = 0; i < contextLines.length; i++) {
        var line = contextLines[i];
        var lineNum = line.line_number != null ? String(line.line_number) : '';
        var content = line.content != null ? line.content : '';

        html += '<div class="code-line line-plain">' +
          '<span class="line-num">' + escapeHtml(lineNum) + '</span>' +
          '<span class="line-content">' + escapeHtml(content) + '</span>' +
          '</div>';
      }

      html += '</div>';
      return html;
    }

    /**
     * Render anchor text fallback (plain code block).
     */
    function renderAnchorText(anchorText) {
      if (!anchorText) return '';

      var html = '<div class="context-label">Referenced code</div>';
      html += '<div class="code-context">';

      var lines = anchorText.split('\n');
      for (var i = 0; i < lines.length; i++) {
        html += '<div class="code-line line-plain">' +
          '<span class="line-num">' + (i + 1) + '</span>' +
          '<span class="line-content">' + escapeHtml(lines[i]) + '</span>' +
          '</div>';
      }

      html += '</div>';
      return html;
    }

    /**
     * Render context unavailable notice.
     */
    function renderContextUnavailable(filePath, lineRange) {
      var msg = 'Context unavailable';
      if (filePath) {
        msg += ' for ' + filePath;
      }
      if (lineRange && Array.isArray(lineRange) && lineRange.length >= 2) {
        msg += ' (lines ' + lineRange[0] + '-' + lineRange[1] + ')';
      }
      return '<div class="context-unavailable"><span class="info-icon">&#9432;</span> ' + escapeHtml(msg) + '</div>';
    }

    /**
     * Render an "Additional context" block for suggestions outside any diff hunk.
     * Shows a few lines of file context around the suggestion's lineRange
     * with an "outside changed lines" indicator.
     *
     * @param outsideGroups - Array of { group, lineRange }
     * @param filePath - The file path
     * @param blockContext - Context string for batch actions
     * @returns HTML string
     */
    function renderOutsideHunkGroups(outsideGroups, filePath, blockContext) {
      if (!outsideGroups || outsideGroups.length === 0) return '';

      var html = '';

      outsideGroups.forEach(function(item) {
        var group = item.group;
        var lineRange = item.lineRange;
        var startLine = lineRange && lineRange.length >= 1 ? lineRange[0] : null;
        var endLine = lineRange && lineRange.length >= 2 ? lineRange[1] : startLine;

        // Header: "Additional context (lines N-M)" with outside-changed-lines indicator
        html += '<div class="outside-diff-indicator">Outside changed lines</div>';

        var rangeLabel = 'Additional context';
        if (startLine != null) {
          rangeLabel += ' (lines ' + startLine + (endLine && endLine !== startLine ? '-' + endLine : '') + ')';
        }
        html += '<div class="context-label">' + escapeHtml(rangeLabel) + '</div>';

        // Try to render file context for these specific lines
        var fileContexts = reportData.fileContexts || {};
        var contextEntry = fileContexts[filePath];
        // The generator stores file contexts as objects: {source, lines, available}
        var contextLines = contextEntry && contextEntry.lines ? contextEntry.lines
                         : (Array.isArray(contextEntry) ? contextEntry : null);
        var hasContext = false;

        if (contextLines && Array.isArray(contextLines) && contextLines.length > 0 && startLine != null) {
          // Filter context lines to those near the suggestion's line range
          var contextStart = Math.max(1, startLine - 5);
          var contextEnd = (endLine || startLine) + 5;
          var relevantLines = contextLines.filter(function(cl) {
            return cl.line_number >= contextStart && cl.line_number <= contextEnd;
          });

          if (relevantLines.length > 0) {
            hasContext = true;
            html += '<div class="code-context">';
            relevantLines.forEach(function(cl) {
              var lineNum = cl.line_number != null ? String(cl.line_number) : '';
              var content = cl.content != null ? cl.content : '';
              html += '<div class="code-line line-plain">' +
                '<span class="line-num">' + escapeHtml(lineNum) + '</span>' +
                '<span class="line-content">' + escapeHtml(content) + '</span>' +
                '</div>';
            });
            html += '</div>';
          }
        }

        // Fallback to anchor text from the first suggestion in the group
        if (!hasContext) {
          var anchorText = null;
          var suggestions = group.suggestions || [];
          for (var s = 0; s < suggestions.length; s++) {
            if (suggestions[s].anchorText) {
              anchorText = suggestions[s].anchorText;
              break;
            }
          }
          if (anchorText) {
            html += renderAnchorText(anchorText);
          }
        }

        // Render the group's comment card
        html += renderGroupPlaceholder(group, blockContext);
      });

      return html;
    }

    /**
     * Render code context with three-tier fallback chain:
     * 1. Diff hunks (if available for file)
     * 2. File content context (if available)
     * 3. Anchor text (if available from suggestion)
     * 4. Context unavailable notice
     *
     * anchorText: optional, from the first suggestion's anchorText
     * lineRange: optional, from the first suggestion's lineRange
     */
    function renderCodeContext(filePath, lineRange, anchorText) {
      // Tier 1: Diff hunks
      var diffHtml = renderDiffHunks(filePath);
      if (diffHtml) return diffHtml;

      // Tier 2: File content
      var fileHtml = renderFileContext(filePath, lineRange);
      if (fileHtml) return fileHtml;

      // Tier 3: Anchor text (skip entirely if not available)
      if (anchorText) {
        return renderAnchorText(anchorText);
      }

      // Tier 4: Context unavailable
      return renderContextUnavailable(filePath, lineRange);
    }

    /**
     * Compute summary badge HTML for a file/section/task block header.
     * Returns '[N groups, M suggestions]' and '[N models]' badges.
     */
    function renderBlockSummaryBadges(groups) {
      if (!groups || !Array.isArray(groups) || groups.length === 0) return '';

      var groupCount = groups.length;
      var suggestionCount = 0;
      var modelSet = {};

      groups.forEach(function(group) {
        var suggestions = group.suggestions || [];
        suggestionCount += suggestions.length;
        suggestions.forEach(function(s) {
          var model = s.model || 'unknown';
          modelSet[model] = true;
        });
      });

      var modelCount = Object.keys(modelSet).length;

      var html = '<span class="badge badge-models">' + groupCount + ' group' + (groupCount !== 1 ? 's' : '') +
        ', ' + suggestionCount + ' suggestion' + (suggestionCount !== 1 ? 's' : '') + '</span>';
      html += '<span class="badge badge-models">' + modelCount + ' model' + (modelCount !== 1 ? 's' : '') + '</span>';

      return html;
    }

    /**
     * Compute diff stats for a file (additions/deletions count).
     */
    function computeDiffStats(filePath) {
      var diffData = reportData.diffData || {};
      var fileData = diffData[filePath];
      if (!fileData || fileData.binary) return null;

      var hunks = fileData.hunks || fileData;
      if (!Array.isArray(hunks)) return null;

      var additions = 0;
      var deletions = 0;

      for (var h = 0; h < hunks.length; h++) {
        var lines = hunks[h].lines || hunks[h];
        if (!Array.isArray(lines)) continue;
        for (var i = 0; i < lines.length; i++) {
          var type = lines[i] && lines[i].type;
          if (type === 'add') additions++;
          else if (type === 'remove') deletions++;
        }
      }

      if (additions === 0 && deletions === 0) return null;
      return { additions: additions, deletions: deletions };
    }

    /**
     * Find the first available anchorText and lineRange from groups for a file.
     */
    function findFirstContext(groups) {
      var anchorText = null;
      var lineRange = null;

      for (var g = 0; g < groups.length; g++) {
        var suggestions = groups[g].suggestions || [];
        for (var s = 0; s < suggestions.length; s++) {
          if (!anchorText && suggestions[s].anchorText) {
            anchorText = suggestions[s].anchorText;
          }
          if (!lineRange && suggestions[s].lineRange) {
            lineRange = suggestions[s].lineRange;
          }
          if (anchorText && lineRange) break;
        }
        if (anchorText && lineRange) break;
      }

      return { anchorText: anchorText, lineRange: lineRange };
    }

    // ================================================================
    // Phase-specific rendering (T007 + T009 inline positioning)
    // ================================================================

    /**
     * Render the PR content panel for code review phase.
     * Shows file blocks with diff context and inline-positioned suggestion comments.
     *
     * Inline positioning strategy:
     * 1. Groups with lineRange within a diff hunk -> inline after the referenced diff line
     * 2. Groups with lineRange outside all diff hunks -> "Additional context" block with "outside changed lines" indicator
     * 3. Groups with file_path but no lineRange/anchorText -> file-level comment below last hunk
     * 4. Groups with no file_path -> routed to Global Suggestions section
     * 5. Multiple comments on same line -> stacked vertically by consensus count desc, then importance
     */
    function renderCodeReview() {
      var container = document.getElementById('pr-content');
      if (!container || !reportData) return;

      var fileView = reportData.fileView || {};
      var fileKeys = getCodeFileKeys();

      if (fileKeys.length === 0 && !(fileView._global && (fileView._global.suggestionCount || 0) > 0)) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#9989;</div>' +
          '<div class="empty-state-text">No code review suggestions.</div></div>';
        return;
      }

      var html = '';
      var diffData = reportData.diffData || {};

      // Render each file block
      fileKeys.forEach(function(filePath) {
        var entry = fileView[filePath];
        var groups = sortBucketGroups(entry.suggestions || []);
        var maxImp = (entry.maxImportance || 'low').toLowerCase();
        var ctx = findFirstContext(groups);

        // File block
        html += '<div class="block" id="file-' + escapeHtml(filePath) + '">';

        // Block header
        html += '<div class="block-header" onclick="toggleBlockCollapse(this.parentElement)">';
        html += '<span class="collapse-icon">&#9660;</span>';
        html += '<span class="block-title mono">' + escapeHtml(filePath) + '</span>';
        html += '<div class="block-meta">';

        // Diff stats
        var stats = computeDiffStats(filePath);
        if (stats) {
          html += '<span class="file-stat"><span class="additions">+' + stats.additions + '</span> <span class="deletions">-' + stats.deletions + '</span></span>';
        }

        // Summary badges
        html += renderBlockSummaryBadges(groups);

        // Max importance badge
        if (maxImp === 'high') html += '<span class="badge badge-importance-high">HIGH</span>';
        else if (maxImp === 'medium') html += '<span class="badge badge-importance-medium">MEDIUM</span>';

        html += '</div>'; // block-meta
        html += '</div>'; // block-header

        // Block body
        html += '<div class="block-body">';

        // Get diff hunks for this file
        var fileData = diffData[filePath];
        var diffHunks = null;
        if (fileData && !fileData.binary) {
          diffHunks = fileData.hunks || fileData;
          if (!Array.isArray(diffHunks) || diffHunks.length === 0) diffHunks = null;
        }

        // Classify suggestion groups into positioning buckets
        var classified = classifySuggestionGroups(groups, filePath, diffHunks);

        // Render code context with inline comments
        if (diffHunks) {
          // Use the enhanced diff renderer that interleaves inline comments
          html += renderDiffHunksWithInlineComments(filePath, classified.inlineGroups, filePath);
        } else {
          // No diff available: use fallback context chain
          html += renderCodeContext(filePath, ctx.lineRange, ctx.anchorText);

          // All groups become file-level since we can't position inline
          classified.fileLevelGroups = classified.fileLevelGroups
            .concat(classified.inlineGroups.map(function(ig) { return ig.group; }))
            .concat(classified.outsideGroups.map(function(og) { return og.group; }));
          classified.inlineGroups = [];
          classified.outsideGroups = [];
        }

        // Render groups outside any diff hunk (with "outside changed lines" indicator)
        html += renderOutsideHunkGroups(classified.outsideGroups, filePath, filePath);

        // Render file-level comments (below the last hunk)
        classified.fileLevelGroups.forEach(function(group) {
          html += renderGroupPlaceholder(group, filePath);
        });

        html += '</div>'; // block-body
        html += '</div>'; // block
      });

      // Global suggestions
      var globalEntry = fileView._global;
      if (globalEntry && (globalEntry.suggestionCount || 0) > 0) {
        var globalGroups = globalEntry.suggestions || [];
        html += '<div class="global-section" id="global-suggestions">';
        html += '<div class="global-header" onclick="toggleBlockCollapse(this.parentElement)">';
        html += '<span class="collapse-icon">&#9660;</span>';
        html += '<span class="block-title" style="font-style:italic;">Global / Cross-Cutting Suggestions</span>';
        html += '<div class="block-meta">';
        html += renderBlockSummaryBadges(globalGroups);
        html += '</div>';
        html += '</div>'; // global-header
        html += '<div class="global-body">';

        globalGroups.forEach(function(group) {
          html += renderGroupPlaceholder(group, 'Global');
        });

        html += '</div>'; // global-body
        html += '</div>'; // global-section
      }

      container.innerHTML = html;
    }

    /**
     * Render the PR content panel for plan review phase.
     * Shows section blocks with markdown content and suggestion placeholders.
     */
    /**
     * Sort a list of view keys by the best (lowest) priority rank among
     * their suggestion groups. Used in priority mode for all views.
     */
    function sortKeysByPriority(keys, viewData) {
      var sortConfig = reportData.sortConfig || {};
      var valOrder = sortConfig.validationOrder || {};
      var impOrder = sortConfig.importanceOrder || {};
      var unknownStatus = sortConfig.unknownStatusRank || 5;
      var unknownImp = sortConfig.unknownImportanceRank || 3;

      var keysWithRank = keys.map(function(key) {
        var entry = viewData[key];
        var groups = (entry && entry.suggestions) || [];
        var bestVal = unknownStatus;
        var bestImp = unknownImp;
        groups.forEach(function(g) {
          var vr = valOrder[g.validationStatus] !== undefined ? valOrder[g.validationStatus] : unknownStatus;
          var ir = impOrder[(g.maxImportance || '').toUpperCase()] !== undefined ? impOrder[(g.maxImportance || '').toUpperCase()] : unknownImp;
          if (vr < bestVal || (vr === bestVal && ir < bestImp)) {
            bestVal = vr;
            bestImp = ir;
          }
        });
        return { key: key, valRank: bestVal, impRank: bestImp };
      });

      keysWithRank.sort(function(a, b) {
        if (a.valRank !== b.valRank) return a.valRank - b.valRank;
        if (a.impRank !== b.impRank) return a.impRank - b.impRank;
        return 0;
      });

      return keysWithRank.map(function(item) { return item.key; });
    }

    /**
     * Sort groups within a view bucket based on sortMode.
     * 'natural': sort by originalIndex (preserves input order).
     * 'priority': keep pre-sorted order (already sorted by generator).
     */
    function sortBucketGroups(groups) {
      if (sortMode !== 'natural') return groups;
      return groups.slice().sort(function(a, b) {
        return (a.originalIndex || 0) - (b.originalIndex || 0);
      });
    }

    /**
     * Get ordered section keys for plan review based on sortMode.
     */
    function getPlanSectionKeys() {
      var sectionView = reportData.sectionView || {};
      var allKeys = Object.keys(sectionView);

      if (sortMode === 'natural') {
        var planOrder = reportData.sectionOrder || [];
        var orderedKeys = [];
        var seen = {};
        planOrder.forEach(function(ref) {
          if (sectionView[ref]) {
            orderedKeys.push(ref);
            seen[ref] = true;
          }
        });
        allKeys.forEach(function(key) {
          if (!seen[key]) orderedKeys.push(key);
        });
        return orderedKeys;
      }

      // Priority mode: suggestion-bearing first (by priority), then no-suggestions in narrative order
      var withSuggestions = allKeys.filter(function(k) { return sectionView[k].hasSuggestions !== false && (sectionView[k].suggestions || []).length > 0; });
      var withoutSuggestions = allKeys.filter(function(k) { return sectionView[k].hasSuggestions === false || (sectionView[k].suggestions || []).length === 0; });
      var sorted = sortKeysByPriority(withSuggestions, sectionView);
      // No-suggestion sections in narrative order
      var planOrder = reportData.sectionOrder || [];
      var orderedNoSugg = [];
      planOrder.forEach(function(ref) {
        if (withoutSuggestions.indexOf(ref) >= 0) orderedNoSugg.push(ref);
      });
      withoutSuggestions.forEach(function(k) {
        if (orderedNoSugg.indexOf(k) < 0) orderedNoSugg.push(k);
      });
      return sorted.concat(orderedNoSugg);
    }

    /**
     * Get ordered file keys for code review based on sortMode.
     */
    function getCodeFileKeys() {
      var fileView = reportData.fileView || {};
      var fileKeys = Object.keys(fileView).filter(function(k) { return k !== '_global'; });

      if (sortMode === 'natural') {
        // Alphabetical by directory then file name
        fileKeys.sort(function(a, b) {
          var dirA = a.lastIndexOf('/') >= 0 ? a.substring(0, a.lastIndexOf('/')) : '';
          var dirB = b.lastIndexOf('/') >= 0 ? b.substring(0, b.lastIndexOf('/')) : '';
          if (dirA !== dirB) return dirA.localeCompare(dirB);
          return a.localeCompare(b);
        });
        return fileKeys;
      }

      return sortKeysByPriority(fileKeys, fileView);
    }

    /**
     * Get ordered task keys for task review based on sortMode.
     */
    function getTaskKeys() {
      var taskView = reportData.taskView || {};
      var taskKeys = Object.keys(taskView).filter(function(k) { return k !== '_coverageGaps' && k !== '_unanchored'; });

      if (sortMode === 'natural') {
        taskKeys.sort(function(a, b) {
          var numA = parseInt(a.replace(/\D/g, ''), 10) || 0;
          var numB = parseInt(b.replace(/\D/g, ''), 10) || 0;
          return numA - numB;
        });
        return taskKeys;
      }

      // Priority mode: suggestion-bearing first (by priority), then no-suggestions in numeric order
      var withSuggestions = taskKeys.filter(function(k) { return taskView[k].hasSuggestions !== false && (taskView[k].suggestions || []).length > 0; });
      var withoutSuggestions = taskKeys.filter(function(k) { return taskView[k].hasSuggestions === false || (taskView[k].suggestions || []).length === 0; });
      var sorted = sortKeysByPriority(withSuggestions, taskView);
      withoutSuggestions.sort(function(a, b) {
        var numA = parseInt(a.replace(/\D/g, ''), 10) || 0;
        var numB = parseInt(b.replace(/\D/g, ''), 10) || 0;
        return numA - numB;
      });
      return sorted.concat(withoutSuggestions);
    }

    function renderPlanReview() {
      var container = document.getElementById('pr-content');
      if (!container || !reportData) return;

      var sectionView = reportData.sectionView || {};
      var sectionKeys = getPlanSectionKeys();
      var fullSectionContexts = reportData.fullSectionContexts || {};

      if (sectionKeys.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#9989;</div>' +
          '<div class="empty-state-text">No plan review suggestions.</div></div>';
        return;
      }

      var html = '';

      sectionKeys.forEach(function(sectionRef) {
        var entry = sectionView[sectionRef];
        if (!entry) return;
        var groups = sortBucketGroups(entry.suggestions || []);
        var hasSuggestions = entry.hasSuggestions !== false && groups.length > 0;
        var maxImp = (entry.maxImportance || 'low').toLowerCase();
        var displayName = sectionRef.replace(/^###?\s*/, '');

        // Section block
        html += '<div class="block' + (hasSuggestions ? '' : ' no-suggestions') + '" id="section-' + escapeHtml(sectionRef) + '">';

        // Block header
        html += '<div class="block-header" onclick="toggleBlockCollapse(this.parentElement)">';
        html += '<span class="collapse-icon">&#9660;</span>';
        html += '<span class="block-title">' + escapeHtml(displayName) + '</span>';
        html += '<div class="block-meta">';

        // Only show badges when there are suggestions
        if (hasSuggestions) {
          html += renderBlockSummaryBadges(groups);
          if (maxImp === 'high') html += '<span class="badge badge-importance-high">HIGH</span>';
          else if (maxImp === 'medium') html += '<span class="badge badge-importance-medium">MEDIUM</span>';
        }

        html += '</div>'; // block-meta
        html += '</div>'; // block-header

        // Block body
        html += '<div class="block-body">';

        // Section content rendered as styled markdown
        var sectionContent = fullSectionContexts[sectionRef];
        if (sectionContent) {
          html += '<div class="section-content">' + renderMarkdown(sectionContent) + '</div>';
        }

        // Suggestion groups - only render when there are suggestions
        if (hasSuggestions) {
          groups.forEach(function(group) {
            html += renderGroupPlaceholder(group, sectionRef);
          });
        }

        html += '</div>'; // block-body
        html += '</div>'; // block
      });

      container.innerHTML = html;
    }

    /**
     * Render task detail card from task metadata.

    function renderTaskDetailsCard(taskMetadata) {
      if (!taskMetadata) {
        return '<div class="task-metadata-unavailable">Task metadata unavailable</div>';

      if (taskMetadata.description) {
        html += '<div class="task-field">';
        html += '<div class="task-field-label">Description</div>';
        html += '<div>' + escapeHtml(taskMetadata.description) + '</div>';
        html += '</div>';
      }

      // Dependencies as linked badges
      var deps = taskMetadata.depends_on || taskMetadata.dependsOn;

        html += '<div class="task-field-label">Dependencies</div>';
        html += '<div class="task-deps">';

        html += '</div>';

      // Acceptance criteria as checklist

      // Complexity badge

      if (complexity) {

        html += '<div class="task-field">';
        html += '<div class="task-field-label">Complexity</div>';
        html += '<span class="complexity-badge ' + compClass + '">' + escapeHtml(complexity.toUpperCase()) + '</span>';
        html += '</div>';
      }

      // Context files
      var contextFiles = taskMetadata.context_files || taskMetadata.contextFiles;
      if (contextFiles && Array.isArray(contextFiles) && contextFiles.length > 0) {
        html += '<div class="task-field">';
        html += '<div class="task-field-label">Context Files</div>';
        html += '<div class="file-list">';
        contextFiles.forEach(function(f) {
          html += '<span>' + escapeHtml(f) + '</span>';
        });
        html += '</div>';
        html += '</div>';
      }

      // Output files
      var outputFiles = taskMetadata.output_files || taskMetadata.outputFiles;
      if (outputFiles && Array.isArray(outputFiles) && outputFiles.length > 0) {
        html += '<div class="task-field">';
        html += '<div class="task-field-label">Output Files</div>';
        html += '<div class="file-list">';
        outputFiles.forEach(function(f) {
          html += '<span>' + escapeHtml(f) + '</span>';
        });
        html += '</div>';
        html += '</div>';
      }

      html += '</div>'; // task-details
      return html;
    }

    /**
     * Render the PR content panel for task review phase.
     * Shows task blocks with detail cards and suggestion placeholders.
     */
    function renderTaskReview() {
      var container = document.getElementById('pr-content');
      if (!container || !reportData) return;

      var taskView = reportData.taskView || {};
      var taskKeys = getTaskKeys();

      var hasUnanchored = taskView._unanchored && (taskView._unanchored.suggestions || []).length > 0;
      if (taskKeys.length === 0 && !(taskView._coverageGaps && (taskView._coverageGaps.suggestions || []).length > 0) && !hasUnanchored) {

          '<div class="empty-state-text">No task review suggestions.</div></div>';

      }

      var html = '';

      // Render each task block
      taskKeys.forEach(function(taskId) {
        var entry = taskView[taskId];
        var groups = sortBucketGroups(entry.suggestions || []);
        var hasSuggestions = entry.hasSuggestions !== false && groups.length > 0;
        var meta = entry.taskMetadata;
