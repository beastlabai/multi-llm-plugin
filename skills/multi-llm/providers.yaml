# providers.yaml - Multi-LLM provider configuration (BASE layer)
#
# This is the built-in BASE layer. Config is assembled lowest -> highest:
#   1. this file (base; always present)
#   2. <git-root>/.multi-llm/providers.yaml   (optional per-project override,
#      auto-discovered; deep-merges its FULL contents — including a `providers:`
#      block — over base, identical to the env layer below)
#   3. MULTI_LLM_PROVIDERS_CONFIG=/path.yaml   (optional env escape hatch)
# Each layer is deep-merged over the one below; LIST values replace wholesale.
# (`command:` is documentation-only and is NEVER executed in any layer.)
# Scaffold a per-project override with `--init`. See the README
# "Per-project configuration" section for the full semantics.
#
# Note: Command construction (flags, arguments, subcommands) is handled by
# provider classes in utils/providers/. This config only contains:
# - command: CLI binary name (used for availability check via `which`)
# - default_timeout: Provider-specific timeout in seconds
# - supports_json_output: Whether provider supports JSON output natively
# - models: List of supported model names for this provider
#
# Effort convention: most providers accept an optional ":effort" suffix on
# model entries, parsed on the LAST colon against a per-provider whitelist
# (see each provider's comment; unknown suffixes pass through as part of the
# model name). Exceptions: cursor-agent and agy encode effort in the model
# name itself; gemini is config-file-only.

providers:
  claude-code:
    command: claude
    default_timeout: 1800
    supports_json_output: true
    max_concurrent: 2
    # Model entries may carry an optional ":effort" suffix (e.g. fable:max),
    # translated to "--effort <level>". Valid: low, medium, high, xhigh, max;
    # unsupported levels are silently downgraded by the CLI per model.
    # Without a suffix, the CLI's default effort applies.
    models:
      - sonnet
      - opus
      - fable
      - haiku

  cursor-agent:
    command: cursor-agent
    default_timeout: 1200
    max_concurrent: 2
    supports_json_output: true
    # Effort is encoded directly in cursor-agent's own model names (e.g. the
    # -xhigh variants); no ":effort" suffix support needed or implemented.
    models:
      - auto
      - glm-5.2-max
      - gpt-5.5-extra-high
      - gpt-5.6-sol-xhigh
      - gemini-3.1-pro
      - gemini-3.5-flash
      - kimi-k2.7-code
      - glm-5.2-high
      - grok-4.5-xhigh
      - claude-sonnet-5-thinking-xhigh
      - claude-opus-4-8-thinking-xhigh
      - claude-fable-5-high
      - composer-2.5

  gemini:
    command: gemini
    default_timeout: 1200  # Gemini can be slower
    supports_json_output: true
    # No per-run effort control in gemini-cli (no flag, no env var). To control
    # thinking, define a custom alias with a thinkingConfig under
    # modelConfigs.customAliases in ~/.gemini/settings.json (or the project's
    # .gemini/settings.json) and list that alias name here as the model.
    # Gemini 3 models take thinkingLevel LOW/HIGH; 2.5 takes a numeric thinkingBudget.
    models:
      - gemini-3-flash
      - gemini-3-pro
      - gemini-3.1-pro
      - gemini-2.5-flash
      - gemini-2.5-pro

  grok:
    command: grok
    default_timeout: 1200
    supports_json_output: true  # Single JSON object with "text" field
    # Run "grok models" to see the full list of available models
    # ":effort" suffix (e.g. grok-4.5:low) -> "--reasoning-effort <level>".
    # Valid: none, minimal, low, medium, high, xhigh, max. Per-model support
    # varies: grok-4.5 supports high/medium/low; grok-composer-2.5-fast has none.
    models:
      - grok-4.5:high
      - grok-composer-2.5-fast

  opencode:
    command: opencode
    default_timeout: 1200
    supports_json_output: true  # Uses --format json (NDJSON event stream)
    # Run "opencode models" to see the full list of available models
    # ":effort" suffix (e.g. openai/gpt-5.5:high) -> "run --variant <name>".
    # Variant names are provider-specific (OpenAI: none/minimal/low/medium/high/xhigh;
    # Anthropic: high/max); unknown variants are resolved/ignored server-side.
    models:
      - opencode/big-pickle
      - opencode/sonnet
      - opencode/deepseek-v4-flash-free
      - opencode/hy3-free
      - opencode/nemotron-3-ultra-free
      - google/gemini-3.1-pro-preview
      - openai/gpt-5.5

  codex:
    command: codex
    default_timeout: 1800
    supports_json_output: true  # Uses --json (NDJSON event stream)
    # Model entries may carry an optional ":effort" suffix (e.g. gpt-5.5:high),
    # translated by the codex adapter to "-c model_reasoning_effort=<effort>".
    # Valid efforts: none, minimal, low, medium, high, xhigh.
    # Without a suffix, codex uses the default from the user's ~/.codex/config.toml
    models:
      - gpt-5.5
      - gpt-5.5:high
      - gpt-5.6-terra
      - gpt-5.6-sol
      - gpt-5.6-sol:xhigh

  kilocode:
    command: kilocode
    default_timeout: 1200
    supports_json_output: false  # Plain text output; --json streams too much data
    # Run "kilocode models" to see the full list of available models
    # Model names use 3-part format: backend/provider/model
    # ":variant" suffix -> "run --variant <name>". Variant names are MODEL-specific
    # (glm-5.2: high/xhigh; kimi/minimax: thinking/instant; qwen, nemotron, mimo
    # have none) — discover via "kilocode models <backend> --verbose".
    # GOTCHA: an invalid/unsupported variant is SILENTLY ignored. Whitelisted
    # suffixes: none, minimal, low, medium, high, xhigh, max, thinking, instant;
    # anything else (e.g. ":free" model ids) passes through as part of the model name.
    max_concurrent: 2
    models:
      - openrouter/moonshotai/kimi-k2.7-code
      - openrouter/nvidia/nemotron-3-ultra-550b-a55b
      - openrouter/z-ai/glm-5.2:xhigh
      - kilo/z-ai/glm-5.2
      - openrouter/minimax/minimax-m2.7
      - openrouter/minimax/minimax-m3:xhigh
      - openrouter/x-ai/grok-4.20-multi-agent
      - openrouter/arcee-ai/trinity-large-thinking
      - openrouter/xiaomi/mimo-v2.5-pro
      - openrouter/qwen/qwen3.7-max:xhigh
      - openrouter/tencent/hy3:xhigh
      - openrouter/stepfun/step-3.7-flash:xhigh
      - openrouter/openai/gpt-5.5-pro
      - openai/gpt-5.5-pro
      - openrouter/nex-agi/nex-n2-pro
      - openrouter/inclusionai/ring-2.6-1t
      - openrouter/google/gemini-3.5-flash
      - google/gemini-3.1-pro-preview
      - openrouter/deepseek/deepseek-v4-pro
      - openrouter/anthropic/claude-sonnet-5
      - openrouter/anthropic/claude-fable-5

  cline:
    command: cline
    default_timeout: 1200
    supports_json_output: true  # JSONL event stream; final run_result line holds the answer
    # Model names use the format <cline-provider>/<model-id>, e.g.
    # openrouter/z-ai/glm-5.2 — the segment before the first "/" is the cline
    # backend provider (-P), the rest is the model id (-m).
    # -m mutates the saved default in ~/.cline, so cap concurrency.
    # ":effort" suffix -> "--thinking <level>". Valid: none, low, medium, high,
    # xhigh; the CLI hard-errors (exit 1) on invalid levels. Unlike -m,
    # --thinking does NOT mutate the saved default in ~/.cline.
    # Note: xhigh may be downgraded to high on some provider paths inside cline.
    max_concurrent: 2
    models:
      - openrouter/z-ai/glm-5.2
      - openrouter/moonshotai/kimi-k2.7-code
      - openrouter/openai/gpt-5.5

  goose:
    command: goose
    default_timeout: 1200
    supports_json_output: true  # Single JSON envelope with messages transcript
    # Model names use the format <goose-provider>/<model-id>, e.g.
    # openrouter/z-ai/glm-5.2 — the segment before the first "/" is the goose
    # backend provider (--provider), the rest is the model id (--model).
    # Auth is env-only: the openrouter backend needs OPENROUTER_API_KEY in
    # the environment.
    # ":effort" suffix -> exported as GOOSE_THINKING_EFFORT env var for the
    # subprocess (goose has no CLI flag). Valid: off, none, low, medium, high,
    # max, xhigh. GOTCHA: goose SILENTLY ignores it for openrouter models it
    # doesn't classify as reasoning-capable, and silently ignores invalid values.
    models:
      - openrouter/z-ai/glm-5.2
      - openrouter/moonshotai/kimi-k2.7-code
      - openrouter/openai/gpt-5.5

  aider:
    command: aider
    default_timeout: 1200
    supports_json_output: false  # Plain text output after a "► **ANSWER**" marker
    # Model names are litellm model specs passed VERBATIM to --model, e.g.
    # openrouter/z-ai/glm-5.2 (no provider/model splitting).
    # Auth is env-only: openrouter/ models need OPENROUTER_API_KEY in the
    # environment.
    # ":effort" suffix -> "--reasoning-effort <value>". Whitelist: none, minimal,
    # low, medium, high, xhigh. Aider passes the value through unvalidated:
    # openrouter/ models always accept it (sent as OpenRouter's reasoning.effort),
    # other models warn-and-ignore.
    models:
      - openrouter/z-ai/glm-5.2
      - openrouter/moonshotai/kimi-k2.7-code
      - openrouter/openai/gpt-5.5

  agy:
    command: agy
    default_timeout: 1200
    supports_json_output: true  # Single JSON envelope with "response" field
    # Model names are the exact DISPLAY NAMES from `agy models` (spaces and
    # parentheses included). GOTCHA: an invalid model name is SILENTLY
    # ignored — agy falls back to its default model with status SUCCESS —
    # so keep these matching `agy models` output exactly.
    # Auth is Google OAuth only: requires a one-time `agy` sign-in
    # (persisted in ~/.gemini/antigravity-cli/); no API keys involved.
    # Effort is already encoded in the display-name model strings ("(High)",
    # "(Low)" etc.); no ":effort" suffix support.
    models:
      - "Gemini 3.5 Flash (Medium)"
      - "Gemini 3.5 Flash (High)"
      - "Gemini 3.5 Flash (Low)"
      - "Gemini 3.1 Pro (Low)"
      - "Gemini 3.1 Pro (High)"
      - "Claude Sonnet 4.6 (Thinking)"
      - "Claude Opus 4.6 (Thinking)"
      - "GPT-OSS 120B (Medium)"

# Default provider when model name doesn't include provider prefix
default_provider: cursor-agent

# Default models to use when no models are specified on CLI
# If set, skips interactive selection and uses these models automatically
# Use --interactive flag to override and force interactive selection
defaults:
  models:
    - cursor-agent:composer-2.5
    #- cursor-agent:gpt-5.6-sol-xhigh
    - cursor-agent:gemini-3.1-pro
    - cursor-agent:grok-4.5-xhigh
    #- cursor-agent:kimi-k2.7-code
    #- opencode:opencode/big-pickle
    - kilocode:openrouter/moonshotai/kimi-k2.7-code:xhigh
    - kilocode:openrouter/nvidia/nemotron-3-ultra-550b-a55b:xhigh
    - kilocode:openrouter/z-ai/glm-5.2:xhigh
    - kilocode:openrouter/minimax/minimax-m3:xhigh
    - kilocode:openrouter/xiaomi/mimo-v2.5-pro:xhigh
    - kilocode:openrouter/qwen/qwen3.7-max:xhigh
    - claude-code:fable:high
    - codex:gpt-5.6-sol:xhigh
    #- grok:grok-4.5
    #- cline:openrouter/z-ai/glm-5.2
    #- goose:openrouter/z-ai/glm-5.2
    #- aider:openrouter/z-ai/glm-5.2
    #- "agy:Gemini 3.1 Pro (High)"

  # Lightweight model subset for the --quick / -q flag
  # Used instead of defaults.models for faster reviews with fewer models
  # Omit --quick to use the full defaults.models list, or pass --interactive to pick manually
  quick_models:
    - cursor-agent:composer-2.5
    - cursor-agent:gpt-5.6-sol-xhigh
    - claude-code:fable:high

  # Optional: only use defaults for specific modes
  # modes:
  #   review-plan:
  #     models:
  #       - cursor-agent:auto
  #       - gemini:gemini-2.5-flash
  #     quick:
  #       - cursor-agent:auto
  #   code-review:
  #     models:
  #       - cursor-agent:gpt-5.2-high
